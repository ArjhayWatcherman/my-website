<!DOCTYPE html>
<html>
<head>
    <title>The Salted One</title>

    <!-- 🔥 FIX NG ₱ SIGN -->
    <meta charset="UTF-8">

    <!-- 🔥 RESPONSIVE -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

        *{
            box-sizing:border-box;
        }

        body{
            margin:0;
            padding:0;
            font-family: Arial;
            color:white;
            text-align:center;

            background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.9)),
            url('logo.png');

            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            min-height:100vh;

            overflow-x:hidden; /* 🔥 tanggal white space */
        }

        .container{
            padding:80px 15px;
        }

        h1{
            font-size:40px;
            margin-bottom:5px;
        }

        p{
            margin-bottom:30px;
        }

        .products{
            display:flex;
            justify-content:center;
            gap:20px;
            flex-wrap:wrap;
        }

        .card{
            background:#000;
            padding:20px;
            border-radius:15px;
            width:100%;
            max-width:250px;
            box-shadow:0 0 15px orange;
        }

        button{
            background:orange;
            border:none;
            padding:10px;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:gold;
        }

        /* 🔥 ORDER FORM */
        .form-box{
            display:none;
            position:fixed;
            top:50%;
            left:50%;
            transform:translate(-50%,-50%);
            background:black;
            padding:20px;
            border-radius:15px;
            box-shadow:0 0 20px orange;
            width:90%;
            max-width:320px;
        }

        .form-box input,
        .form-box select{
            width:100%;
            padding:10px;
            margin:10px 0;
            border:none;
            border-radius:5px;
        }

        .close{
            background:red;
            margin-top:10px;
        }

        /* 🔥 MOBILE FIX */
        @media (max-width:600px){
            h1{
                font-size:28px;
            }
        }

    </style>
</head>

<body>

<div class="container">
    <h1>The Salted One</h1>
    <p>Fresh Salted Eggs Available 🔥</p>

    <div class="products">

        <div class="card">
            <h3>1 Salted Egg</h3>
            <p>₱25</p>
            <button onclick="openForm('1 Salted Egg - ₱25')">Order</button>
        </div>

        <div class="card">
            <h3>6 pcs Salted Egg</h3>
            <p>₱145</p>
            <button onclick="openForm('6 pcs - ₱145')">Order</button>
        </div>

        <div class="card">
            <h3>12 pcs Salted Egg</h3>
            <p>₱280</p>
            <button onclick="openForm('12 pcs - ₱280')">Order</button>
        </div>

    </div>
</div>

<!-- 🔥 ORDER FORM -->
<div class="form-box" id="orderForm">

    <h3>Order Details</h3>

    <p id="productName"></p>

    <input type="text" id="name" placeholder="Your Name">
    <input type="text" id="address" placeholder="Delivery Address">

    <select id="payment">
        <option value="">Select Payment</option>
        <option>GCash</option>
        <option>Cash on Delivery</option>
    </select>

    <button onclick="submitOrder()">Submit</button>
    <button class="close" onclick="closeForm()">Cancel</button>

</div>

<script>

let selectedProduct = "";

function openForm(product){
    selectedProduct = product;
    document.getElementById("orderForm").style.display = "block";
    document.getElementById("productName").innerText = product;
}

function closeForm(){
    document.getElementById("orderForm").style.display = "none";
}

function submitOrder(){
    let name = document.getElementById("name").value;
    let address = document.getElementById("address").value;
    let payment = document.getElementById("payment").value;

    if(name && address && payment){
        alert(
            "ORDER CONFIRMED!\n\n" +
            "Product: " + selectedProduct + "\n" +
            "Name: " + name + "\n" +
            "Address: " + address + "\n" +
            "Payment: " + payment
        );

        closeForm();
    }else{
        alert("Please fill up all fields!");
    }
}

</script>

</body>
</html>
